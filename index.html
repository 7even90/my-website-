<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Khloud Khalid</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            text-align: center;
            color: #333;
        }

        .card {
            background: white;
            width: 350px;
            margin: 80px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #4facfe;
        }

        h1 {
            color: #4facfe;
        }

        p {
            margin: 8px 0;
        }

        .skills {
            margin-top: 15px;
        }

        .skills span {
            display: inline-block;
            background: #4facfe;
            color: white;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/120" alt="Profile Photo">

        <h1>Khloud Khalid</h1>
        <p><strong>Age:</strong> 29</p>
        <p><strong>Job:</strong> Infrastructure Engineer</p>
        <p><strong>Workspace:</strong> Modeem</p>

        <div class="skills">
            <h3>Skills</h3>
            <span>Network Engineering</span>
            <span>GitHub</span>
            <span>IT</span>
            <span>Infrastructure</span>
            <span>Engineering Control</span>
        </div>
    </div>

</body>
</html>
