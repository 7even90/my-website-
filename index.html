<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>موقعي الشخصي</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #121212;
            color: #fff;
            text-align: center;
        }

        header {
            padding: 40px 20px;
            background: #1f1f1f;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            opacity: 0.9;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: #00bcd4;
            color: #000;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }

        .section {
            padding: 40px 20px;
        }

        .card {
            background: #1f1f1f;
            margin: 20px auto;
            padding: 20px;
            max-width: 400px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <header>
        <h1>أهلاً، أنا حسين! 👋</h1>
        <p>هذا موقعي الجميل الذي صممته باستخدام GitHub Pages</p>
        <a class="btn" href="#">اتصل بي</a>
    </header>

    <div class="section">
        <h2>⚡ ماذا أقدم؟</h2>
        <div class="card">
            <h3>خدمات تقنية</h3>
            <p>أقدّم دعم فني، إدارة مواقع، وربط دومينات.</p>
        </div>

        <div class="card">
            <h3>إنشاء مواقع</h3>
            <p>أبني مواقع جميلة وسريعة باستخدام HTML و CSS.</p>
        </div>

        <div class="card">
            <h3>تطوير واجهات</h3>
            <p>أستخدم أفضل ممارسات التصميم لعمل تجربة رائعة.</p>
        </div>
    </div>

</body>
</html>
